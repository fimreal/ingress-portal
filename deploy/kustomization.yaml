apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ingress-portal
resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
images:
  - name: ingress-portal
    newName: ingress-portal
    newTag: latest
labels:
  - pairs:
      app.kubernetes.io/name: ingress-portal
      app.kubernetes.io/version: 1.0.0
      app.kubernetes.io/managed-by: kustomize
